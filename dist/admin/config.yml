backend:
  name: github
  repo: ojochi/ojochi.github.io
  branch: main
  base_url: https://YOUR_OAUTH_PROXY_DOMAIN
  auth_endpoint: /auth

site_url: https://ojochi.github.io
display_url: https://ojochi.github.io
locale: ja

collections:
  - name: news
    label: News
    label_singular: News Item
    folder: src/content/news
    create: true
    extension: md
    format: frontmatter
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    summary: '{{date}} - {{title}}'
    fields:
      - label: Title
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
      - label: Description
        name: description
        widget: text
      - label: Draft
        name: draft
        widget: boolean
        required: false
        default: false
      - label: Body
        name: body
        widget: markdown
